<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flight Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0a0c0f;
    --panel:    #0f1318;
    --panel2:   #141920;
    --border:   #1e2830;
    --border2:  #263040;
    --green:    #00e5a0;
    --green-dim:#007a55;
    --amber:    #ffb020;
    --amber-dim:#7a5000;
    --cyan:     #00c8e0;
    --cyan-dim: #005a66;
    --red:      #ff4455;
    --red-dim:  #7a0010;
    --text:     #c8d8e8;
    --text-dim: #5a7080;
    --mono:     'Share Tech Mono', monospace;
    --sans:     'Rajdhani', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: var(--sans); font-size: 15px; min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(0,200,224,0.04) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 100%, rgba(0,229,160,0.04) 0%, transparent 50%);
  }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 24px; border-bottom: 1px solid var(--border);
    background: var(--panel);
  }
  .logo { font-family: var(--mono); font-size: 13px; color: var(--green);
          letter-spacing: 3px; text-transform: uppercase; }
  .logo span { color: var(--text-dim); }
  .header-status { font-family: var(--mono); font-size: 11px;
                   color: var(--text-dim); letter-spacing: 1px; }
  .header-status .dot {
    display: inline-block; width: 7px; height: 7px; border-radius: 50%;
    background: var(--green); margin-right: 6px;
    box-shadow: 0 0 6px var(--green); animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .container { max-width: 700px; margin: 0 auto; padding: 24px; }

  select, input, textarea, button { font-family: var(--sans); font-size: 14px; font-weight: 500; }

  .btn {
    display: inline-flex; align-items: center; gap: 6px; justify-content: center;
    padding: 9px 16px; border: none; border-radius: 4px; cursor: pointer;
    font-weight: 600; letter-spacing: 0.5px; transition: all 0.15s;
    font-size: 13px; font-family: var(--sans);
  }
  .btn-green { background: var(--green-dim); color: var(--green); border: 1px solid var(--green); }
  .btn-green:hover { background: var(--green); color: #000; box-shadow: 0 0 12px rgba(0,229,160,0.4); }
  .btn-amber { background: var(--amber-dim); color: var(--amber); border: 1px solid var(--amber); }
  .btn-amber:hover { background: var(--amber); color: #000; }
  .btn-cyan { background: var(--cyan-dim); color: var(--cyan); border: 1px solid var(--cyan); }
  .btn-cyan:hover { background: var(--cyan); color: #000; }
  .btn-ghost { background: transparent; color: var(--text-dim); border: 1px solid var(--border2); }
  .btn-ghost:hover { border-color: var(--text); color: var(--text); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none !important; }
  .btn-block { width: 100%; padding: 14px; font-size: 15px; }

  .panel { background: var(--panel); border: 1px solid var(--border);
           border-radius: 6px; margin-bottom: 16px; overflow: hidden; }
  .panel-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px; border-bottom: 1px solid var(--border);
    background: var(--panel2);
  }
  .panel-title { font-family: var(--mono); font-size: 11px; letter-spacing: 2px;
                 color: var(--cyan); text-transform: uppercase; }
  .panel-body { padding: 16px; }

  /* Step 1: capture */
  .capture-row { display: flex; gap: 10px; }
  .capture-row .btn { flex: 1; padding: 16px; font-size: 14px; }
  #photo-input, #camera-input { display: none; }
  .preview-wrap { margin-top: 14px; text-align: center; display: none; }
  .preview-wrap.show { display: block; }
  .preview-wrap img { max-width: 100%; max-height: 320px; border-radius: 6px; border: 1px solid var(--border2); }
  #readPhotoBtn { margin-top: 14px; }

  .spinner { display: none; align-items: center; gap: 10px; justify-content: center;
             padding: 14px; font-family: var(--mono); font-size: 12px; color: var(--cyan); }
  .spinner.show { display: flex; }
  .spinner .ring { width: 16px; height: 16px; border: 2px solid var(--cyan-dim);
                   border-top-color: var(--cyan); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Step 2: confirm table */
  .field-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px 14px; }
  .field-group { display: flex; flex-direction: column; gap: 4px; }
  .field-group.wide { grid-column: 1 / -1; }
  .field-label { font-family: var(--mono); font-size: 10px; color: var(--text-dim);
                 letter-spacing: 1.5px; text-transform: uppercase; display: flex; gap: 6px; align-items: center; }
  .src-badge { font-family: var(--mono); font-size: 9px; letter-spacing: 0.5px;
               padding: 1px 5px; border-radius: 8px; text-transform: none; }
  .src-badge.photo       { background: var(--green-dim); color: var(--green); }
  .src-badge.schedule    { background: var(--cyan-dim); color: var(--cyan); }
  .src-badge.flightaware { background: var(--cyan-dim); color: var(--cyan); }
  .src-badge.default     { background: var(--amber-dim); color: var(--amber); }
  .field-input {
    background: var(--panel2); color: var(--text); border: 1px solid var(--border2);
    padding: 9px 10px; border-radius: 4px; font-family: var(--mono); font-size: 16px;
    transition: border-color 0.15s; width: 100%;
  }
  .field-input:focus { outline: none; border-color: var(--cyan); }
  .field-input.readonly { color: var(--green); background: transparent; border-style: dashed; }
  select.field-input { cursor: pointer; }
  .field-group.flag { flex-direction: row; align-items: center; gap: 8px; padding-top: 18px; }
  .field-group.flag input[type=checkbox] { width: 18px; height: 18px; accent-color: var(--cyan); }
  .field-group.flag label { font-family: var(--mono); font-size: 12px; text-transform: none; }
  textarea.field-input { resize: vertical; min-height: 60px; font-family: var(--sans); font-size: 15px; }

  .diversion-banner {
    display: none; margin-top: 10px; padding: 10px 12px; border-radius: 4px;
    background: var(--red-dim); border: 1px solid var(--red); color: var(--red);
    font-family: var(--mono); font-size: 12px;
  }
  .diversion-banner.show { display: block; }

  .ocr-note { font-family: var(--mono); font-size: 11px; color: var(--text-dim); margin-top: 10px; }

  .fa-result {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 12px; margin-bottom: 6px; border-radius: 4px;
    background: var(--panel2); border: 1px solid var(--border2);
    cursor: pointer; font-family: var(--mono); font-size: 13px; transition: all 0.15s;
  }
  .fa-result:hover { border-color: var(--amber); background: rgba(255,176,32,0.08); }
  .fa-result .fa-route { color: var(--text); }
  .fa-result .fa-times { color: var(--amber); }

  /* Recent submissions */
  .recent-table { width: 100%; border-collapse: collapse; }
  .recent-table th {
    font-family: var(--mono); font-size: 10px; letter-spacing: 1px;
    color: var(--text-dim); text-transform: uppercase; padding: 8px 10px;
    text-align: left; border-bottom: 1px solid var(--border); background: var(--panel2);
  }
  .recent-table td { padding: 8px 10px; border-bottom: 1px solid var(--border);
                      font-family: var(--mono); font-size: 13px; }
  .recent-table tr:last-child td { border-bottom: none; }
  .status-pill { font-size: 10px; padding: 2px 7px; border-radius: 8px; letter-spacing: 0.5px; }
  .status-pill.created   { background: var(--green-dim); color: var(--green); }
  .status-pill.duplicate { background: var(--amber-dim); color: var(--amber); }
  .status-pill.error     { background: var(--red-dim); color: var(--red); }
  .empty-state { text-align: center; padding: 32px 24px;
                 color: var(--text-dim); font-family: var(--mono); font-size: 13px; }

  #toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--panel2); border: 1px solid var(--green);
    color: var(--green); font-family: var(--mono); font-size: 12px;
    padding: 10px 18px; border-radius: 4px; max-width: 80vw;
    transform: translateY(60px); opacity: 0; transition: all 0.25s; z-index: 200;
  }
  #toast.show { transform: translateY(0); opacity: 1; }
  #toast.error { border-color: var(--red); color: var(--red); }

  @media (max-width: 640px) {
    header { padding: 12px 14px; }
    .container { padding: 14px; }
    select, input, textarea, button, .field-input { font-size: 16px; }
    .field-grid { grid-template-columns: 1fr 1fr; }
    .capture-row { flex-direction: column; }
    #toast { left: 16px; right: 16px; bottom: 16px; text-align: center; }
    .recent-table th:nth-child(4), .recent-table td:nth-child(4) { display: none; } /* hide "off/on" on phones */
  }
</style>
</head>
<body>

<header>
  <div class="logo">FL<span>/</span>LOG</div>
  <div class="header-status"><span class="dot"></span>SYSTEM READY</div>
</header>

<div class="container">

  <!-- Step 1: capture -->
  <div class="panel" id="capturePanel">
    <div class="panel-header"><div class="panel-title">1 · Capture</div></div>
    <div class="panel-body">
      <div class="capture-row">
        <button class="btn btn-cyan" onclick="document.getElementById('photo-input').click()">📁 Choose Photo</button>
        <button class="btn btn-cyan" onclick="document.getElementById('camera-input').click()">📷 Take Photo</button>
      </div>
      <input type="file" id="photo-input" accept="image/*" onchange="onFileChosen(this.files[0])">
      <input type="file" id="camera-input" accept="image/*" capture="environment" onchange="onFileChosen(this.files[0])">

      <div class="preview-wrap" id="previewWrap">
        <img id="previewImg" alt="Selected photo">
      </div>

      <button class="btn btn-green btn-block" id="readPhotoBtn" onclick="readPhoto()" disabled style="margin-top:14px">
        ▶ Read Photo
      </button>
      <div class="spinner" id="ocrSpinner"><span class="ring"></span><span id="ocrSpinnerText">Reading display…</span></div>

      <button class="btn btn-amber btn-block" onclick="toggleFaLookup()" style="margin-top:10px">
        🛩 Look Up FlightAware
      </button>

      <div id="faLookupPanel" style="display:none; margin-top:14px">
        <div class="field-grid">
          <div class="field-group">
            <label class="field-label">Tail</label>
            <input class="field-input" id="fa-tail" placeholder="N22DB">
          </div>
          <div class="field-group">
            <label class="field-label">Date</label>
            <input class="field-input" type="date" id="fa-date">
          </div>
        </div>
        <button class="btn btn-amber btn-block" onclick="searchFlightAware()" style="margin-top:10px">Search</button>
        <div class="spinner" id="faSpinner"><span class="ring"></span><span>Searching FlightAware…</span></div>
        <div id="faResults" style="margin-top:10px"></div>
      </div>

      <button class="btn btn-ghost btn-block" onclick="manualEntry()" style="margin-top:10px">
        ✏ Manual Entry (no photo)
      </button>
    </div>
  </div>

  <!-- Step 2: confirm -->
  <div class="panel" id="confirmPanel" style="display:none">
    <div class="panel-header"><div class="panel-title">2 · Confirm</div></div>
    <div class="panel-body">
      <div class="field-grid">
        <div class="field-group">
          <label class="field-label">Date <span class="src-badge" id="src-date"></span></label>
          <input class="field-input" type="date" id="f-date" onchange="onCoreFieldChange()">
        </div>
        <div class="field-group">
          <label class="field-label">Tail <span class="src-badge" id="src-tail"></span></label>
          <input class="field-input" id="f-tail" placeholder="N93LA" onchange="onCoreFieldChange()">
        </div>
        <div class="field-group">
          <label class="field-label">Dep <span class="src-badge" id="src-dep"></span></label>
          <input class="field-input" id="f-dep" placeholder="KIWA" onchange="onCoreFieldChange()">
        </div>
        <div class="field-group">
          <label class="field-label">Arr <span class="src-badge" id="src-arr"></span></label>
          <input class="field-input" id="f-arr" placeholder="KIWA" onchange="onCoreFieldChange()">
        </div>
        <div class="field-group">
          <label class="field-label">Time Off (Z) <span class="src-badge photo">photo</span></label>
          <input class="field-input" id="f-off" placeholder="1720" maxlength="4" onchange="onCoreFieldChange()">
        </div>
        <div class="field-group">
          <label class="field-label">Time On (Z) <span class="src-badge photo">photo</span></label>
          <input class="field-input" id="f-on" placeholder="1853" maxlength="4" onchange="onCoreFieldChange()">
        </div>
        <div class="field-group">
          <label class="field-label">Total Time</label>
          <input class="field-input readonly" id="f-total" readonly>
        </div>

        <div class="field-group">
          <label class="field-label">Role</label>
          <select class="field-input" id="f-role">
            <option value="PIC">PIC</option>
            <option value="SIC">SIC</option>
          </select>
        </div>
        <div class="field-group">
          <label class="field-label">Taxi (hr)</label>
          <input class="field-input" type="number" step="0.1" id="f-taxi" value="0.3" onchange="onCoreFieldChange()">
        </div>
        <div class="field-group">
          <label class="field-label">Landings</label>
          <input class="field-input" type="number" step="1" id="f-landings" value="1">
        </div>
        <div class="field-group">
          <label class="field-label">Instrument (hr)</label>
          <input class="field-input" type="number" step="0.1" id="f-instrument" value="0">
        </div>
        <div class="field-group">
          <label class="field-label">CFI (hr)</label>
          <input class="field-input" type="number" step="0.1" id="f-cfi" value="0">
        </div>
        <div class="field-group">
          <label class="field-label">Solo (hr)</label>
          <input class="field-input" type="number" step="0.1" id="f-solo" value="0">
        </div>
        <div class="field-group">
          <label class="field-label">Holds</label>
          <input class="field-input" type="number" step="1" id="f-holds" value="0">
        </div>
        <div class="field-group">
          <label class="field-label">App. ILS</label>
          <input class="field-input" type="number" step="1" id="f-app-ils" value="0">
        </div>
        <div class="field-group">
          <label class="field-label">App. GPS</label>
          <input class="field-input" type="number" step="1" id="f-app-gps" value="0">
        </div>
        <div class="field-group">
          <label class="field-label">Night (hr)</label>
          <input class="field-input" type="number" step="0.1" id="f-night-hours" value="0" onchange="markTouched('f-night-hours')">
        </div>
        <div class="field-group">
          <label class="field-label">Night Ldg</label>
          <input class="field-input" type="number" step="1" id="f-night-landings" value="0" onchange="markTouched('f-night-landings')">
        </div>
        <div class="field-group">
          <label class="field-label">Cross Country (hr)</label>
          <input class="field-input" type="number" step="0.1" id="f-xc" value="0" onchange="markTouched('f-xc')">
        </div>

        <div class="field-group flag">
          <input type="checkbox" id="f-intl">
          <label for="f-intl">International</label>
        </div>
        <div class="field-group flag">
          <input type="checkbox" id="f-ocean">
          <label for="f-ocean">Ocean crossing</label>
        </div>

        <div class="field-group wide">
          <label class="field-label">Comments</label>
          <textarea class="field-input" id="f-comments" placeholder="Notes about this flight…" onchange="markTouched('f-comments')"></textarea>
        </div>
      </div>

      <div class="diversion-banner" id="diversionBanner"></div>
      <div class="ocr-note" id="ocrNote"></div>

      <button class="btn btn-amber btn-block" id="submitBtn" onclick="submitFlight()" style="margin-top:16px">
        ✈ Submit to MyFlightBook
      </button>
    </div>
  </div>

  <!-- Recent -->
  <div class="panel" id="recentPanel">
    <div class="panel-header">
      <div class="panel-title">Recent Submissions</div>
      <a class="btn btn-ghost" href="/api/flights/export" style="text-decoration:none">↓ Export</a>
    </div>
    <div class="panel-body" style="padding:0">
      <table class="recent-table" id="recentTable" style="display:none">
        <thead><tr><th>Date</th><th>Route</th><th>Tail</th><th>Off/On</th><th>Hrs</th><th>Status</th></tr></thead>
        <tbody id="recentTbody"></tbody>
      </table>
      <div class="empty-state" id="recentEmpty">No flights submitted yet</div>
    </div>
  </div>

</div>

<div id="toast"></div>

<script>
let selectedFile = null;
let touched = new Set();   // computed fields the pilot has hand-edited since last autocalc
let autocalcTimer = null;
let lastGndDist = null;    // from the photo OCR, reused for the diversion check on later schedule lookups

function toast(msg, err=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = err ? 'show error' : 'show';
  setTimeout(() => t.className = t.className.replace('show', ''), 3200);
}

async function api(method, path, body, isForm=false) {
  const opts = { method, headers: isForm ? {} : {'Content-Type': 'application/json'} };
  if (body) opts.body = isForm ? body : JSON.stringify(body);
  const r = await fetch(path, opts);
  const data = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(data.message || data.error || `HTTP ${r.status}`);
  return data;
}

function onFileChosen(file) {
  if (!file) return;
  selectedFile = file;
  const img = document.getElementById('previewImg');
  img.src = URL.createObjectURL(file);
  document.getElementById('previewWrap').classList.add('show');
  document.getElementById('readPhotoBtn').disabled = false;
  document.getElementById('confirmPanel').style.display = 'none';
}

function setSrcBadge(id, source) {
  const el = document.getElementById('src-' + id);
  if (!el) return;
  if (!source) { el.textContent = ''; el.className = 'src-badge'; return; }
  const label = {photo: 'photo', schedule: 'schedule', 'default': 'default'}[source] || source;
  const cls = {photo: 'photo', schedule: 'schedule', 'default': 'default'}[source] || '';
  el.textContent = label;
  el.className = 'src-badge ' + cls;
}

async function readPhoto() {
  if (!selectedFile) return;
  const btn = document.getElementById('readPhotoBtn');
  const spinner = document.getElementById('ocrSpinner');
  btn.disabled = true;
  spinner.classList.add('show');
  try {
    const fd = new FormData();
    fd.append('image', selectedFile);
    const r = await api('POST', '/api/parse-acars', fd, true);

    touched = new Set();
    resetManualFields();
    document.getElementById('f-date').value = r.date || '';
    document.getElementById('f-tail').value = r.tail || '';
    document.getElementById('f-dep').value = r.dep_airport || '';
    document.getElementById('f-arr').value = r.arr_airport || '';
    document.getElementById('f-off').value = r.time_off || '';
    document.getElementById('f-on').value = r.time_on || '';
    setSrcBadge('date', r.date_source);
    setSrcBadge('tail', r.tail_source);
    setSrcBadge('dep', r.dep_source);
    setSrcBadge('arr', r.arr_source);
    if (r.crew) document.getElementById('f-comments').value = `Crew: ${r.crew}`;
    lastGndDist = r.gnd_dist;

    applyAutocalc(r.autocalc);

    const banner = document.getElementById('diversionBanner');
    if (r.diversion_suspected) {
      banner.textContent = '⚠ ' + r.diversion_note;
      banner.classList.add('show');
    } else {
      banner.classList.remove('show');
    }

    let note = `Read via ${r._source}.`;
    if (r.air_dist || r.gnd_dist) note += ` Air dist ${r.air_dist ?? '—'}nm, ground dist ${r.gnd_dist ?? '—'}nm.`;
    if (!r.time_off || !r.time_on) note += ' Could not read both times with confidence — check them.';
    document.getElementById('ocrNote').textContent = note;

    document.getElementById('confirmPanel').style.display = '';
    document.getElementById('confirmPanel').scrollIntoView({behavior: 'smooth'});
  } catch (e) {
    toast('OCR failed: ' + e.message, true);
  } finally {
    btn.disabled = false;
    spinner.classList.remove('show');
  }
}

function markTouched(id) { touched.add(id); }

function applyAutocalc(calc) {
  if (!calc) return;
  document.getElementById('f-total').value = calc.total_flight_time ?? '';
  if (!touched.has('f-night-hours'))     document.getElementById('f-night-hours').value = calc.night_hours ?? 0;
  if (!touched.has('f-night-landings'))  document.getElementById('f-night-landings').value = calc.night_landings ?? 0;
  if (!touched.has('f-xc'))              document.getElementById('f-xc').value = calc.cross_country ?? 0;
  if (!touched.has('f-intl'))            document.getElementById('f-intl').checked = !!calc.international;
  if (!touched.has('f-ocean'))           document.getElementById('f-ocean').checked = !!calc.ocean_crossing;
}

function onCoreFieldChange() {
  clearTimeout(autocalcTimer);
  autocalcTimer = setTimeout(async () => { await maybeLookupSchedule(); recalc(); }, 300);
}

async function maybeLookupSchedule() {
  // Neither the tail nor dep/arr are reliably on the FMS photo, so this pulls
  // whichever of them are still blank from the ScheduleMate/PFM trip sheet —
  // by tail+date if a tail is known, otherwise by date alone (this DB is
  // Paul's own personal schedule, so "my only leg that day" is a safe guess).
  // Never overwrites a field the photo or the pilot already filled in.
  const tailEl = document.getElementById('f-tail');
  const date = document.getElementById('f-date').value;
  const depEl = document.getElementById('f-dep');
  const arrEl = document.getElementById('f-arr');
  if (!date) return;
  if (tailEl.value.trim() && depEl.value.trim() && arrEl.value.trim()) return;
  try {
    const params = new URLSearchParams({date});
    if (tailEl.value.trim()) params.set('tail', tailEl.value.trim());
    const off = document.getElementById('f-off').value.trim();
    if (off) params.set('time_off', off);
    if (lastGndDist) params.set('gnd_dist', lastGndDist);
    const r = await api('GET', '/api/pfm-lookup?' + params.toString());
    if (!r.found) return;
    if (!tailEl.value.trim()) { tailEl.value = r.tail; setSrcBadge('tail', 'schedule'); }
    if (!depEl.value.trim()) { depEl.value = r.dep_airport; setSrcBadge('dep', 'schedule'); }
    if (!arrEl.value.trim()) { arrEl.value = r.arr_airport; setSrcBadge('arr', 'schedule'); }
    const commentsEl = document.getElementById('f-comments');
    if (r.crew && !touched.has('f-comments') && !commentsEl.value.trim()) {
      commentsEl.value = `Crew: ${r.crew}`;
    }
    const banner = document.getElementById('diversionBanner');
    if (r.diversion_suspected) {
      banner.textContent = '⚠ ' + r.diversion_note;
      banner.classList.add('show');
    }
  } catch (e) { /* silent — confirm table still usable without the schedule lookup */ }
}

async function recalc() {
  const dep = document.getElementById('f-dep').value.trim();
  const arr = document.getElementById('f-arr').value.trim();
  const date = document.getElementById('f-date').value;
  const off = document.getElementById('f-off').value.trim();
  const on = document.getElementById('f-on').value.trim();
  if (!dep || !arr || !date || !off || !on) {
    document.getElementById('f-total').value = '';
    return;
  }
  try {
    const calc = await api('POST', '/api/autocalc', {
      dep_airport: dep, arr_airport: arr, date, time_off: off, time_on: on,
      taxi: parseFloat(document.getElementById('f-taxi').value || 0.3),
    });
    applyAutocalc(calc);
  } catch (e) { /* silent — confirm table still usable without live recalc */ }
}

async function submitFlight() {
  const btn = document.getElementById('submitBtn');
  const body = {
    date: document.getElementById('f-date').value,
    tail: document.getElementById('f-tail').value.trim(),
    dep_airport: document.getElementById('f-dep').value.trim(),
    arr_airport: document.getElementById('f-arr').value.trim(),
    time_off: document.getElementById('f-off').value.trim(),
    time_on: document.getElementById('f-on').value.trim(),
    role: document.getElementById('f-role').value,
    taxi: parseFloat(document.getElementById('f-taxi').value || 0.3),
    landings: parseInt(document.getElementById('f-landings').value || 1),
    instrument: parseFloat(document.getElementById('f-instrument').value || 0),
    cfi: parseFloat(document.getElementById('f-cfi').value || 0),
    solo: parseFloat(document.getElementById('f-solo').value || 0),
    holds: parseInt(document.getElementById('f-holds').value || 0),
    approaches_ils: parseInt(document.getElementById('f-app-ils').value || 0),
    approaches_gps: parseInt(document.getElementById('f-app-gps').value || 0),
    night_hours: parseFloat(document.getElementById('f-night-hours').value || 0),
    night_landings: parseInt(document.getElementById('f-night-landings').value || 0),
    cross_country: parseFloat(document.getElementById('f-xc').value || 0),
    international: document.getElementById('f-intl').checked,
    ocean_crossing: document.getElementById('f-ocean').checked,
    comments: document.getElementById('f-comments').value,
  };
  btn.disabled = true;
  btn.textContent = 'Submitting…';
  try {
    const r = await api('POST', '/api/flights', body);
    if (r.push_result.status === 'created') {
      toast(`Sent to MyFlightbook — flight #${r.mfb_flight_id}`);
    } else if (r.push_result.status === 'duplicate') {
      toast(`Possible duplicate of existing flight #${r.mfb_flight_id} — saved locally, not re-pushed`, true);
    } else {
      toast('Saved locally but MyFlightbook push failed: ' + r.push_result.message, true);
    }
    resetForm();
    loadRecent();
  } catch (e) {
    toast('Submit failed: ' + e.message, true);
  } finally {
    btn.disabled = false;
    btn.textContent = '✈ Submit to MyFlightBook';
  }
}

function resetManualFields() {
  // CFI/Solo/Holds/Approaches are never OCR'd or auto-computed — always start
  // a fresh entry (photo or manual) at zero.
  ['f-cfi', 'f-solo', 'f-holds', 'f-app-ils', 'f-app-gps'].forEach(id => document.getElementById(id).value = 0);
}

function resetForm() {
  selectedFile = null;
  touched = new Set();
  lastGndDist = null;
  resetManualFields();
  document.getElementById('photo-input').value = '';
  document.getElementById('camera-input').value = '';
  document.getElementById('previewWrap').classList.remove('show');
  document.getElementById('readPhotoBtn').disabled = true;
  document.getElementById('confirmPanel').style.display = 'none';
  document.getElementById('capturePanel').scrollIntoView({behavior: 'smooth'});
}

function manualEntry() {
  selectedFile = null;
  touched = new Set();
  lastGndDist = null;
  resetManualFields();
  document.getElementById('photo-input').value = '';
  document.getElementById('camera-input').value = '';
  document.getElementById('previewWrap').classList.remove('show');

  document.getElementById('f-date').value = new Date().toISOString().slice(0, 10);
  ['f-tail', 'f-dep', 'f-arr', 'f-off', 'f-on', 'f-total', 'f-comments'].forEach(id => document.getElementById(id).value = '');
  ['f-night-hours', 'f-night-landings', 'f-xc'].forEach(id => document.getElementById(id).value = 0);
  document.getElementById('f-intl').checked = false;
  document.getElementById('f-ocean').checked = false;
  document.getElementById('f-taxi').value = 0.3;
  document.getElementById('f-landings').value = 1;
  ['date', 'tail', 'dep', 'arr'].forEach(id => setSrcBadge(id, null));
  document.getElementById('diversionBanner').classList.remove('show');
  document.getElementById('ocrNote').textContent = 'Manual entry — no photo read. Fill in the times and route yourself.';

  document.getElementById('confirmPanel').style.display = '';
  document.getElementById('confirmPanel').scrollIntoView({behavior: 'smooth'});
}

let faFlights = [];
let faTail = '';

function toggleFaLookup() {
  const panel = document.getElementById('faLookupPanel');
  const showing = panel.style.display !== 'none';
  panel.style.display = showing ? 'none' : '';
  if (!showing && !document.getElementById('fa-date').value) {
    document.getElementById('fa-date').value = new Date().toISOString().slice(0, 10);
  }
}

async function searchFlightAware() {
  const tail = document.getElementById('fa-tail').value.trim();
  const date = document.getElementById('fa-date').value;
  const resultsEl = document.getElementById('faResults');
  const spinner = document.getElementById('faSpinner');
  if (!tail || !date) { toast('Enter a tail and date', true); return; }
  resultsEl.innerHTML = '';
  spinner.classList.add('show');
  try {
    const r = await api('GET', `/api/flightaware-lookup?tail=${encodeURIComponent(tail)}&date=${date}`);
    faFlights = r.flights || [];
    faTail = tail.toUpperCase();
    if (!faFlights.length) {
      resultsEl.innerHTML = '<div class="empty-state" style="padding:16px">No completed flights found for that tail/date</div>';
      return;
    }
    resultsEl.innerHTML = faFlights.map((f, i) => `
      <div class="fa-result" onclick="pickFlightAwareFlight(${i})">
        <span class="fa-route">${f.dep_airport} → ${f.arr_airport}${f.aircraft_type ? ' · ' + f.aircraft_type : ''}</span>
        <span class="fa-times">${f.time_off}Z–${f.time_on}Z</span>
      </div>`).join('');
  } catch (e) {
    toast('FlightAware lookup failed: ' + e.message, true);
  } finally {
    spinner.classList.remove('show');
  }
}

function pickFlightAwareFlight(i) {
  const f = faFlights[i];
  selectedFile = null;
  touched = new Set();
  lastGndDist = null;
  resetManualFields();
  document.getElementById('f-date').value = f.date;
  document.getElementById('f-tail').value = faTail;
  document.getElementById('f-dep').value = f.dep_airport;
  document.getElementById('f-arr').value = f.arr_airport;
  document.getElementById('f-off').value = f.time_off;
  document.getElementById('f-on').value = f.time_on;
  ['date', 'tail', 'dep', 'arr'].forEach(id => setSrcBadge(id, 'flightaware'));
  document.getElementById('diversionBanner').classList.remove('show');
  document.getElementById('ocrNote').textContent = `Imported from FlightAware${f.aircraft_type ? ' (' + f.aircraft_type + ')' : ''}.`;
  recalc();
  document.getElementById('confirmPanel').style.display = '';
  document.getElementById('confirmPanel').scrollIntoView({behavior: 'smooth'});
}

function statusPillHtml(f) {
  if (!f.mfb_status) return '';
  const label = f.mfb_status === 'created' ? `#${f.mfb_flight_id}` : f.mfb_status;
  return `<span class="status-pill ${f.mfb_status}">${label}</span>`;
}

async function loadRecent() {
  try {
    const flights = await api('GET', '/api/flights');
    const table = document.getElementById('recentTable');
    const tbody = document.getElementById('recentTbody');
    const empty = document.getElementById('recentEmpty');
    if (!flights.length) { table.style.display = 'none'; empty.style.display = ''; return; }
    table.style.display = ''; empty.style.display = 'none';
    tbody.innerHTML = flights.map(f => `
      <tr>
        <td>${f.date}</td>
        <td>${f.dep_airport}-${f.arr_airport}</td>
        <td>${f.tail}</td>
        <td>${f.time_off}/${f.time_on}</td>
        <td>${f.total_loggable_hours ?? '—'}</td>
        <td>${statusPillHtml(f)}</td>
      </tr>`).join('');
  } catch (e) { /* non-fatal */ }
}

loadRecent();
</script>
</body>
</html>
