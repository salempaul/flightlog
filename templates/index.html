<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flight Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0a0c0f;
    --panel:    #0f1318;
    --panel2:   #141920;
    --border:   #1e2830;
    --border2:  #263040;
    --green:    #00e5a0;
    --green-dim:#007a55;
    --amber:    #ffb020;
    --amber-dim:#7a5000;
    --cyan:     #00c8e0;
    --cyan-dim: #005a66;
    --red:      #ff4455;
    --red-dim:  #7a0010;
    --text:     #c8d8e8;
    --text-dim: #5a7080;
    --mono:     'Share Tech Mono', monospace;
    --sans:     'Rajdhani', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: var(--sans); font-size: 15px; min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(0,200,224,0.04) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 100%, rgba(0,229,160,0.04) 0%, transparent 50%);
  }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 24px; border-bottom: 1px solid var(--border);
    background: var(--panel);
  }
  .logo { font-family: var(--mono); font-size: 13px; color: var(--green);
          letter-spacing: 3px; text-transform: uppercase; }
  .logo span { color: var(--text-dim); }
  .header-status { font-family: var(--mono); font-size: 11px;
                   color: var(--text-dim); letter-spacing: 1px; }
  .header-status .dot {
    display: inline-block; width: 7px; height: 7px; border-radius: 50%;
    background: var(--green); margin-right: 6px;
    box-shadow: 0 0 6px var(--green); animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .container { max-width: 900px; margin: 0 auto; padding: 24px; }

  .trip-bar { display: flex; gap: 10px; align-items: center;
              margin-bottom: 20px; flex-wrap: wrap; }

  select, input, button { font-family: var(--sans); font-size: 14px; font-weight: 500; }

  .select-trip {
    flex: 1; min-width: 200px; background: var(--panel2); color: var(--text);
    border: 1px solid var(--border2); padding: 9px 12px; border-radius: 4px;
    cursor: pointer; font-family: var(--mono); font-size: 13px;
  }
  .select-trip:focus { outline: none; border-color: var(--cyan); }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 9px 16px; border: none; border-radius: 4px; cursor: pointer;
    font-weight: 600; letter-spacing: 0.5px; transition: all 0.15s;
    font-size: 13px; font-family: var(--sans);
  }
  .btn-green { background: var(--green-dim); color: var(--green); border: 1px solid var(--green); }
  .btn-green:hover { background: var(--green); color: #000; box-shadow: 0 0 12px rgba(0,229,160,0.4); }
  .btn-amber { background: var(--amber-dim); color: var(--amber); border: 1px solid var(--amber); }
  .btn-amber:hover { background: var(--amber); color: #000; }
  .btn-ghost { background: transparent; color: var(--text-dim); border: 1px solid var(--border2); }
  .btn-ghost:hover { border-color: var(--text); color: var(--text); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .panel { background: var(--panel); border: 1px solid var(--border);
           border-radius: 6px; margin-bottom: 16px; overflow: hidden; }
  .panel-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px; border-bottom: 1px solid var(--border);
    background: var(--panel2);
  }
  .panel-title { font-family: var(--mono); font-size: 11px; letter-spacing: 2px;
                 color: var(--cyan); text-transform: uppercase; }
  .panel-body { padding: 16px; }

  .info-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
  .field-group { display: flex; flex-direction: column; gap: 4px; }
  .field-label { font-family: var(--mono); font-size: 10px; color: var(--text-dim);
                 letter-spacing: 1.5px; text-transform: uppercase; }
  .field-input {
    background: var(--panel2); color: var(--text); border: 1px solid var(--border2);
    padding: 8px 10px; border-radius: 4px; font-family: var(--mono); font-size: 14px;
    transition: border-color 0.15s; width: 100%;
  }
  .field-input:focus { outline: none; border-color: var(--cyan); }

  /* Paper log table */
  .paper-log { width: 100%; border-collapse: collapse; margin-bottom: 16px;
               background: var(--panel); border: 1px solid var(--border); border-radius: 6px;
               overflow: hidden; font-family: var(--mono); }
  .paper-log th {
    background: var(--panel2); padding: 10px 16px; text-align: center;
    font-size: 10px; letter-spacing: 1.5px; color: var(--text-dim);
    text-transform: uppercase; border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border);
  }
  .paper-log th:first-child { text-align: left; width: 90px; }
  .paper-log th:last-child { border-right: none; }
  .paper-log td {
    padding: 10px 16px; text-align: center; border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border); font-size: 22px;
  }
  .paper-log td:first-child {
    font-size: 11px; letter-spacing: 1px; color: var(--text-dim);
    text-align: left; text-transform: uppercase; border-right: 1px solid var(--border);
  }
  .paper-log td:last-child { border-right: none; }
  .paper-log tr:last-child td { border-bottom: none; }
  .paper-log tr.row-today td { background: #0f1f18; }
  .paper-log tr.row-total td { background: #0f1a10; }
  .paper-log .val-green { color: var(--green); }
  .paper-log .val-amber { color: var(--amber); }
  .paper-log .val-dim   { color: var(--text-dim); font-size: 14px; }
  .paper-log input.log-input {
    background: transparent; border: none; border-bottom: 1px solid var(--border2);
    color: var(--text); font-family: var(--mono); font-size: 22px;
    text-align: center; width: 100%; padding: 0;
  }
  .paper-log input.log-input:focus { outline: none; border-bottom-color: var(--cyan); }

  /* Legs table */
  .legs-table { width: 100%; border-collapse: collapse; }
  .legs-table th {
    font-family: var(--mono); font-size: 10px; letter-spacing: 1.5px;
    color: var(--text-dim); text-transform: uppercase; padding: 8px 10px;
    text-align: left; border-bottom: 1px solid var(--border); background: var(--panel2);
  }
  .legs-table td { padding: 6px 6px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .legs-table tr:last-child td { border-bottom: none; }
  .legs-table tr:hover td { background: rgba(255,255,255,0.02); }

  .leg-num { font-family: var(--mono); font-size: 13px; color: var(--text-dim);
             padding: 0 10px; text-align: center; }

  .td-input {
    background: var(--panel2); color: var(--text); border: 1px solid transparent;
    padding: 6px 8px; border-radius: 3px; font-family: var(--mono); font-size: 14px;
    width: 100%; transition: border-color 0.15s;
  }
  .td-input:focus { outline: none; border-color: var(--cyan); background: var(--bg); }
  .td-input.time { width: 68px; text-align: center; letter-spacing: 2px; }
  .td-input.date { width: 72px; }

  .calc-cell { font-family: var(--mono); font-size: 14px;
               padding: 6px 10px; text-align: center; white-space: nowrap; }
  .calc-cell.time  { color: var(--amber); }
  .calc-cell.tenth { color: var(--green); font-size: 18px; }
  .calc-cell.empty { color: var(--text-dim); }

  .acars-btn {
    background: var(--cyan-dim); color: var(--cyan); border: 1px solid var(--cyan-dim);
    padding: 5px 10px; border-radius: 3px; cursor: pointer;
    font-size: 12px; font-family: var(--mono); transition: all 0.15s; white-space: nowrap;
  }
  .acars-btn:hover { background: var(--cyan); color: #000; }
  .acars-btn.loading { opacity: 0.6; cursor: wait; }

  .delete-btn {
    background: transparent; color: var(--red-dim); border: none;
    cursor: pointer; font-size: 16px; padding: 4px 8px; border-radius: 3px;
    transition: color 0.15s;
  }
  .delete-btn:hover { color: var(--red); }

  /* Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--panel); border: 1px solid var(--border2);
    border-radius: 8px; padding: 24px; width: 400px; max-width: 95vw;
  }
  .modal h2 { font-family: var(--mono); font-size: 12px; letter-spacing: 2px;
              color: var(--cyan); text-transform: uppercase; margin-bottom: 20px; }
  .modal-fields { display: flex; flex-direction: column; gap: 14px; margin-bottom: 20px; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

  .empty-state { text-align: center; padding: 48px 24px;
                 color: var(--text-dim); font-family: var(--mono); font-size: 13px; }
  .empty-state .big { font-size: 40px; margin-bottom: 12px; opacity: 0.3; }

  #toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--panel2); border: 1px solid var(--green);
    color: var(--green); font-family: var(--mono); font-size: 12px;
    padding: 10px 18px; border-radius: 4px;
    transform: translateY(60px); opacity: 0; transition: all 0.25s; z-index: 200;
  }
  #toast.show { transform: translateY(0); opacity: 1; }
  #toast.error { border-color: var(--red); color: var(--red); }

  #acars-file-input { display: none; }

  /* ── Mobile / portrait ─────────────────────────────────────────── */
  @media (max-width: 640px) {
    header { padding: 12px 14px; }
    .container { padding: 14px; }

    /* Stop iOS zoom-on-focus: form controls need >=16px */
    select, input, button, .field-input, .select-trip,
    .td-input, .td-input.time, .td-input.date { font-size: 16px; }

    /* Trip bar: full-width stacked controls */
    .trip-bar { gap: 8px; }
    .trip-bar .select-trip { flex: 1 1 100%; }
    .trip-bar .btn { flex: 1 1 calc(50% - 4px); justify-content: center; }

    /* Summary table: tighter so 3 cols fit */
    .paper-log th { padding: 8px 6px; font-size: 9px; }
    .paper-log td { padding: 8px 6px; font-size: 18px; }
    .paper-log td:first-child,
    .paper-log th:first-child { width: auto; font-size: 10px; }
    .paper-log input.log-input { font-size: 18px; }

    /* Legs: turn each row into a labeled card */
    .legs-table thead { display: none; }
    .legs-table, .legs-table tbody { display: block; }
    .legs-table tr {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 12px;
      margin: 12px; padding: 14px;
      background: var(--panel2);
      border: 1px solid var(--border2); border-radius: 8px;
    }
    .legs-table tr:hover td { background: transparent; }
    .legs-table td {
      padding: 0; border: none; text-align: left;
      display: flex; flex-direction: column; gap: 4px; min-width: 0;
    }
    .legs-table td[data-label]::before {
      content: attr(data-label);
      font-family: var(--mono); font-size: 9px; letter-spacing: 1px;
      color: var(--text-dim); text-transform: uppercase;
    }
    .legs-table .td-input,
    .legs-table .td-input.time,
    .legs-table .td-input.date { width: 100%; text-align: left; letter-spacing: 1px; }
    .legs-table .calc-cell { text-align: left; padding: 0; }

    /* Card grid placement (cells are in fixed source order) */
    .legs-table td.leg-num {
      grid-column: 1; grid-row: 1; align-self: center;
      font-family: var(--mono); font-size: 13px; letter-spacing: 1px;
      color: var(--cyan); text-transform: uppercase;
    }
    .legs-table td.leg-num::before { content: "LEG "; }
    .legs-table td.del-cell   { grid-column: 2; grid-row: 1; align-items: flex-end; }
    .legs-table td.del-cell .delete-btn { font-size: 22px; }
    .legs-table td:nth-child(2) { grid-column: 1 / -1; grid-row: 2; } /* DATE */
    .legs-table td:nth-child(3) { grid-column: 1; grid-row: 3; }      /* TIME OFF */
    .legs-table td:nth-child(4) { grid-column: 2; grid-row: 3; }      /* TIME ON */
    .legs-table td:nth-child(5) { grid-column: 1; grid-row: 4; }      /* FLT TIME */
    .legs-table td:nth-child(6) { grid-column: 2; grid-row: 4; }      /* HR/TENTH */
    .legs-table td.acars-cell   { grid-column: 1 / -1; grid-row: 5; }
    .legs-table td.acars-cell .acars-btn {
      width: 100%; padding: 12px; font-size: 14px; text-align: center;
    }

    /* Toast spans the bottom on small screens */
    #toast { left: 16px; right: 16px; bottom: 16px; text-align: center; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">FL<span>/</span>LOG</div>
  <div class="header-status"><span class="dot"></span>SYSTEM READY</div>
</header>

<div class="container">

  <div class="trip-bar">
    <select class="select-trip" id="tripSelect" onchange="loadTrip(this.value)">
      <option value="">— SELECT TRIP —</option>
    </select>
    <button class="btn btn-green" onclick="openModal()">+ NEW TRIP</button>
    <button class="btn btn-amber" id="exportBtn" onclick="exportCSV()" disabled>↓ EXPORT</button>
    <button class="btn" style="background:var(--red-dim);color:var(--red);border:1px solid var(--red)" onclick="deleteAllTrips()">✕ DELETE ALL</button>
  </div>

  <!-- Paper log table -->
  <table class="paper-log" id="summaryStrip">
    <thead>
      <tr>
        <th>Flight Time</th>
        <th>Aircraft Hours</th>
        <th>Aircraft Landings</th>
      </tr>
    </thead>
    <tbody>
      <tr class="row-todate">
        <td>To Date</td>
        <td><input class="log-input" id="sumHTD" type="number" step="0.1" placeholder="—" oninput="scheduleSave()"></td>
        <td><input class="log-input" id="sumLTD" type="number" placeholder="—" oninput="scheduleSave()"></td>
      </tr>
      <tr class="row-today">
        <td>Today</td>
        <td class="val-green" id="sumToday">—</td>
        <td class="val-green" id="sumCycles">—</td>
      </tr>
      <tr class="row-total">
        <td>Total</td>
        <td class="val-amber" id="sumTotal">—</td>
        <td class="val-amber" id="sumTotalL">—</td>
      </tr>
    </tbody>
  </table>

  <!-- Trip info -->
  <div class="panel" id="tripPanel" style="display:none">
    <div class="panel-header">
      <div class="panel-title">TRIP INFO</div>
      <button class="btn btn-ghost" style="font-size:11px;padding:5px 10px" onclick="saveTripInfo()">SAVE</button>
    </div>
    <div class="panel-body">
      <div class="info-grid">
        <div class="field-group">
          <div class="field-label">Aircraft</div>
          <input class="field-input" id="infoAircraft" placeholder="N176KH" oninput="scheduleSave()">
        </div>
        <div class="field-group">
          <div class="field-label">Date</div>
          <input class="field-input" id="infoDate" placeholder="23 MAY 26" oninput="scheduleSave()">
        </div>
        <div class="field-group">
          <div class="field-label">Trip Name</div>
          <input class="field-input" id="infoName" placeholder="TEB-ACY-PHL" oninput="scheduleSave()">
        </div>
      </div>
    </div>
  </div>

  <!-- Legs -->
  <div class="panel" id="legsPanel" style="display:none">
    <div class="panel-header">
      <div class="panel-title">LEGS</div>
      <button class="btn btn-green" style="font-size:11px;padding:5px 12px" onclick="addLeg()">+ ADD LEG</button>
    </div>
    <div class="panel-body" style="padding:0">
      <table class="legs-table">
        <thead>
          <tr>
            <th style="width:36px">#</th>
            <th>DATE (Z)</th>
            <th>TIME OFF</th>
            <th>TIME ON</th>
            <th>FLT TIME</th>
            <th>HR/TENTH</th>
            <th>ACARS</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="legsTbody"></tbody>
      </table>
      <div id="emptyLegs" class="empty-state" style="display:none">
        <div class="big">✈</div>
        <div>No legs yet</div>
      </div>
    </div>
  </div>

</div>

<!-- New trip modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>NEW TRIP</h2>
    <div class="modal-fields">
      <div class="field-group">
        <div class="field-label">Hours To Date</div>
        <input class="field-input" id="ntHTD" type="number" step="0.1" placeholder="2235.6">
      </div>
      <div class="field-group">
        <div class="field-label">Landings To Date</div>
        <input class="field-input" id="ntLTD" type="number" placeholder="1028">
      </div>
      <div class="field-group">
        <div class="field-label">Trip Name (optional)</div>
        <input class="field-input" id="ntName" placeholder="TEB-ACY-PHL">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">CANCEL</button>
      <button class="btn btn-green" onclick="createTrip()">CREATE</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<input type="file" id="acars-file-input" accept="image/*">

<script>
let trip = null;
let saveTimer = null;
let acarsLegId = null;

async function api(method, path, body) {
  const opts = { method, headers: {'Content-Type':'application/json'} };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch('/api' + path, opts);
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

function toast(msg, err=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show' + (err ? ' error' : '');
  setTimeout(() => t.className = '', 2500);
}

async function loadTripList() {
  const trips = await api('GET', '/trips');
  const sel = document.getElementById('tripSelect');
  const cur = sel.value;
  sel.innerHTML = '<option value="">— SELECT TRIP —</option>';
  trips.forEach(t => {
    const o = document.createElement('option');
    o.value = t.id;
    o.textContent = `${t.aircraft||'?'} · ${t.date||'?'}${t.name ? ' · '+t.name : ''}`;
    sel.appendChild(o);
  });
  if (cur) sel.value = cur;
}

async function loadTrip(id) {
  if (!id) {
    trip = null;
    document.getElementById('tripPanel').style.display = 'none';
    document.getElementById('legsPanel').style.display = 'none';
    document.getElementById('exportBtn').disabled = true;
    updateSummary(null); return;
  }
  trip = await api('GET', `/trips/${id}`);
  render();
}

function render() {
  if (!trip) return;
  document.getElementById('tripPanel').style.display = '';
  document.getElementById('legsPanel').style.display = '';
  document.getElementById('exportBtn').disabled = false;
  document.getElementById('infoAircraft').value = trip.aircraft || '';
  document.getElementById('infoDate').value     = trip.date || '';
  document.getElementById('infoName').value     = trip.name || '';
  renderLegs();
  updateSummary(trip);
}

function updateSummary(t) {
  const setText = (id, v) => document.getElementById(id).textContent = v;
  if (!t) {
    document.getElementById('sumHTD').value = '';
    document.getElementById('sumLTD').value = '';
    setText('sumToday', '—'); setText('sumTotal', '—');
    setText('sumCycles', '—'); setText('sumTotalL', '—');
    return;
  }
  const htdEl = document.getElementById('sumHTD');
  const ltdEl = document.getElementById('sumLTD');
  if (document.activeElement !== htdEl) htdEl.value = (parseFloat(t.hours_to_date)||0).toFixed(1);
  if (document.activeElement !== ltdEl) ltdEl.value = t.landings_to_date || 0;
  setText('sumToday',  t.today_hours.toFixed(1));
  setText('sumCycles', t.today_cycles);
  setText('sumTotal',  t.total_hours.toFixed(1));
  setText('sumTotalL', t.total_landings);
}

function renderLegs() {
  const tbody = document.getElementById('legsTbody');
  const empty = document.getElementById('emptyLegs');
  tbody.innerHTML = '';
  if (!trip || trip.legs.length === 0) { empty.style.display=''; return; }
  empty.style.display = 'none';
  trip.legs.forEach(leg => {
    const tr = document.createElement('tr');
    tr.dataset.legId = leg.id;
    const tenth = leg.flight_hr_tenth != null ? leg.flight_hr_tenth.toFixed(1) : '—';
    const ftime = leg.flight_time_display || '—';
    tr.innerHTML = `
      <td class="leg-num">${leg.leg_number}</td>
      <td data-label="DATE (Z)"><input class="td-input date" value="${leg.date_z||''}" placeholder="23MAY"
           onchange="patchLeg(${leg.id},'date_z',this.value)"></td>
      <td data-label="TIME OFF"><input class="td-input time" value="${leg.time_off||''}" placeholder="——"
           maxlength="4" onchange="patchLeg(${leg.id},'time_off',this.value)"></td>
      <td data-label="TIME ON"><input class="td-input time" value="${leg.time_on||''}" placeholder="——"
           maxlength="4" onchange="patchLeg(${leg.id},'time_on',this.value)"></td>
      <td class="calc-cell time ${leg.flight_time_display?'':'empty'}" data-label="FLT TIME">${ftime}</td>
      <td class="calc-cell tenth ${leg.flight_hr_tenth!=null?'':'empty'}" data-label="HR/TENTH">${tenth}</td>
      <td class="acars-cell"><button class="acars-btn" id="ab-${leg.id}" onclick="triggerAcars(${leg.id})">📷 ACARS</button></td>
      <td class="del-cell"><button class="delete-btn" onclick="deleteLeg(${leg.id})">×</button></td>
    `;
    tbody.appendChild(tr);
  });
}

async function patchLeg(id, field, value) {
  try {
    trip = await api('PUT', `/legs/${id}`, {[field]: value});
    const leg = trip.legs.find(l => l.id === id);
    const tr  = document.querySelector(`tr[data-leg-id="${id}"]`);
    if (leg && tr) {
      const cells = tr.querySelectorAll('.calc-cell');
      cells[0].textContent = leg.flight_time_display || '—';
      cells[0].className = `calc-cell time ${leg.flight_time_display?'':'empty'}`;
      cells[1].textContent = leg.flight_hr_tenth != null ? leg.flight_hr_tenth.toFixed(1) : '—';
      cells[1].className = `calc-cell tenth ${leg.flight_hr_tenth!=null?'':'empty'}`;
    }
    updateSummary(trip);
  } catch(e) { toast('Save failed', true); }
}

async function addLeg() {
  if (!trip) return;
  try {
    trip = await api('POST', `/trips/${trip.id}/legs`, {});
    renderLegs(); updateSummary(trip);
    const newLeg = trip.legs[trip.legs.length - 1];
    if (newLeg) triggerAcars(newLeg.id);
  } catch(e) { toast('Failed', true); }
}

async function deleteLeg(id) {
  if (!confirm('Delete this leg?')) return;
  try {
    trip = await api('DELETE', `/legs/${id}`);
    renderLegs(); updateSummary(trip);
  } catch(e) { toast('Failed', true); }
}

async function deleteAllTrips() {
  if (!confirm('Delete ALL trips? This cannot be undone.')) return;
  try {
    await api('DELETE', '/trips');
    trip = null;
    await loadTripList();
    document.getElementById('tripPanel').style.display = 'none';
    document.getElementById('legsPanel').style.display = 'none';
    document.getElementById('exportBtn').disabled = true;
    updateSummary(null);
    toast('All trips deleted');
  } catch(e) { toast('Delete failed', true); }
}

function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveTripInfo, 1200);
}

async function saveTripInfo() {
  if (!trip) return;
  try {
    trip = await api('PUT', `/trips/${trip.id}`, {
      aircraft:         document.getElementById('infoAircraft').value,
      date:             document.getElementById('infoDate').value,
      hours_to_date:    parseFloat(document.getElementById('sumHTD').value) || 0,
      landings_to_date: parseInt(document.getElementById('sumLTD').value)   || 0,
      name:             document.getElementById('infoName').value,
    });
    updateSummary(trip);
    await loadTripList();
    toast('Saved ✓');
  } catch(e) { toast('Save failed', true); }
}

function openModal()  { document.getElementById('modal').classList.add('open');
                        setTimeout(() => document.getElementById('ntHTD').focus(), 50); }
function closeModal() { document.getElementById('modal').classList.remove('open'); }

async function createTrip() {
  try {
    trip = await api('POST', '/trips', {
      hours_to_date:    parseFloat(document.getElementById('ntHTD').value)  || 0,
      landings_to_date: parseInt(document.getElementById('ntLTD').value)    || 0,
      name:             document.getElementById('ntName').value,
    });
    closeModal();
    await loadTripList();
    document.getElementById('tripSelect').value = trip.id;
    render();
    toast('Trip created ✓');
    await addLeg();
  } catch(e) { toast('Failed', true); }
}

// ACARS
function triggerAcars(legId) {
  acarsLegId = legId;
  const inp = document.getElementById('acars-file-input');
  inp.value = ''; inp.click();
}

document.getElementById('acars-file-input').addEventListener('change', async function() {
  if (!this.files || !this.files[0]) return;
  const id  = acarsLegId;
  const btn = document.getElementById(`ab-${id}`);
  if (btn) { btn.textContent = '⏳…'; btn.classList.add('loading'); }
  const fd = new FormData();
  fd.append('image', this.files[0]);
  try {
    const res  = await fetch('/api/parse-acars', {method:'POST', body:fd});
    const data = await res.json();
    if (data._ocr_raw) console.log('[ACARS OCR]\n' + data._ocr_raw);
    if (data.error) throw new Error(data.error);
    const updates = {};
    if (data.time_off) updates.time_off = data.time_off;
    if (data.time_on)  updates.time_on  = data.time_on;
    if (Object.keys(updates).length) {
      trip = await api('PUT', `/legs/${id}`, updates);
      renderLegs(); updateSummary(trip);
      toast('Times loaded ✓');
    } else {
      toast('Could not read times — enter manually', true);
    }
  } catch(e) {
    toast('OCR failed: ' + e.message, true);
  } finally {
    const b = document.getElementById(`ab-${id}`);
    if (b) { b.textContent = '📷 ACARS'; b.classList.remove('loading'); }
  }
});

function exportCSV() {
  if (trip) window.location.href = `/api/trips/${trip.id}/export`;
}

document.getElementById('modal').addEventListener('click', e => { if (e.target===e.currentTarget) closeModal(); });
document.getElementById('modal').addEventListener('keydown', e => { if(e.key==='Enter') createTrip(); if(e.key==='Escape') closeModal(); });

loadTripList();
</script>
